---
- name: Fail if OS is not Debian family
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "This role only supports Debian/Ubuntu systems"

- name: Install prerequisite packages
  ansible.builtin.apt:
    name: "{{ docker_prereq_packages }}"
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: "{{ docker_keyring_path }}"
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_keyring_file }}"
    mode: "0644"

- name: Configure Docker repository
  ansible.builtin.copy:
    dest: "{{ docker_sources_file }}"
    content: |
      Types: deb
      URIs: {{ docker_repo_url }}
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: {{ docker_keyring_file }}
    mode: "0644"
  notify: restart docker

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: "{{ docker_package_state }}"

- name: Ensure Docker service state
  ansible.builtin.service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"

- name: Add malcolm user account to Docker group
  ansible.builtin.user:
    name: malcolm
    groups: docker
    append: yes

- name: Add directories for docker volumes
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: malcolm
    group: malcolm
    mode: "0755"
  loop: "{{ docker_volume_directories }}"

- name: Download nginx reverse proxy files from S3
  ansible.builtin.command: >
    aws s3 sync s3://docker-volumes-663468155566-eu-west-1-an/nginx/rproxy/
    /home/malcolm/docker-volumes/nginx/rproxy/
  register: s3_download
  become_user: malcolm

- name: Ensure correct ownership on downloaded files
  ansible.builtin.file:
    path: /home/malcolm/docker-volumes/nginx/rproxy/
    owner: malcolm
    group: malcolm
    recurse: yes

- name: Copy init-mongo.sh with executable permissions
  ansible.builtin.copy:
    src: init-mongo.sh
    dest: /home/malcolm/docker-volumes/unifi-mongodb/init/init-mongo.sh
    owner: malcolm
    group: malcolm
    mode: "0755"

- name: Ensure sites-enabled directory exists
  ansible.builtin.file:
    path: "{{ docker_volume_reverse_proxy_enabled_path }}"
    state: directory
    owner: malcolm
    group: malcolm
    mode: '0755'

- name: List files in sites-available directory
  ansible.builtin.find:
    paths: "{{ docker_volume_reverse_proxy_available_path }}"
    file_type: file
  register: available_files

- name: Create symlinks in sites-enabled pointing to nginx enabled path
  ansible.builtin.file:
    src: "{{ reverse_proxy_sites_enabled_path }}/{{ item.path | basename }}"
    dest: "{{ docker_volume_reverse_proxy_enabled_path }}/{{ item.path | basename }}"
    state: link
  loop: "{{ available_files.files }}"