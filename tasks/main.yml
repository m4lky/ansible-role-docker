- name: Copy nginx config directory
  ansible.builtin.copy:
    src: "nginx/config/"
    dest: "/home/malcolm/docker-volumes/nginx/rproxy/config/"
    mode: '0664'

- name: Copy nginx certs directory
  ansible.builtin.copy:
    src: "nginx/certs/"
    dest: "/home/malcolm/docker-volumes/nginx/rproxy/config/"
    mode: '0664'

- name: Deploy all nginx templates for reverse proxy
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ docker_volume_reverse_proxy_available_path }}/{{ item | basename | regex_replace('\\.j2$', '') }}"
  loop: "{{ query('fileglob', role_path + '/templates/nginx/*.j2') }}"

- name: Ensure correct ownership on config files
  ansible.builtin.file:
    path: /home/malcolm/docker-volumes/nginx/rproxy/
    owner: malcolm
    group: malcolm
    recurse: yes

- name: Copy init-mongo.sh with executable permissions
  ansible.builtin.copy:
    src: init-mongo.sh
    dest: /home/malcolm/docker-volumes/unifi-mongodb/init/init-mongo.sh
    owner: malcolm
    group: malcolm
    mode: "0755"

- name: Ensure sites-enabled directory exists
  ansible.builtin.file:
    path: "{{ docker_volume_reverse_proxy_enabled_path }}"
    state: directory
    owner: malcolm
    group: malcolm
    mode: '0755'

- name: List files in sites-available directory
  ansible.builtin.find:
    paths: "{{ docker_volume_reverse_proxy_available_path }}"
    file_type: file
  register: available_files

- name: Create relative symlinks in sites-enabled
  ansible.builtin.file:
    src: "../sites-available/{{ item.path | basename }}"
    dest: "{{ docker_volume_reverse_proxy_enabled_path }}/{{ item.path | basename }}"
    state: link
  loop: "{{ available_files.files }}"

