---
- name: Fail if OS is not Debian family
  ansible.builtin.assert:
    that:
      - ansible_os_family == "Debian"
    fail_msg: "This role only supports Debian/Ubuntu systems"

- name: Install prerequisite packages
  ansible.builtin.apt:
    name: "{{ docker_prereq_packages }}"
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: "{{ docker_keyring_path }}"
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: "{{ docker_keyring_file }}"
    mode: "0644"

- name: Configure Docker repository
  ansible.builtin.copy:
    dest: "{{ docker_sources_file }}"
    content: |
      Types: deb
      URIs: {{ docker_repo_url }}
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Signed-By: {{ docker_keyring_file }}
    mode: "0644"
  notify: restart docker

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: "{{ docker_package_state }}"

- name: Ensure Docker service state
  ansible.builtin.service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"

- name: Add malcolm user account to Docker group
  user:
    name: malcolm
    groups: docker
    append: yes
